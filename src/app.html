<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            :root {
                --primary-color: #002834;
                --secondary-color: #004d66;
                --tertiary-color: #006d88;
                --accent-color: #88fafc;
                --text-color: #eee;
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                color-scheme: dark;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

                background-color: var(--primary-color);
                color: var(--text-color);

                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
            }

            h1, h2, h3, h4, h5, h6 {
                margin: 0;
            }

            a {
                color: var(--accent-color);
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            a:visited {
                color: var(--accent-color);
            }

            div#contents {
                display: flex;
                flex-direction: column;
                min-height: 99.9vh;
            }
        </style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="contents">%sveltekit.body%</div>
	</body>
</html>
