<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            :root {
                --primary-color: #002834;
                --secondary-color: #004d66;
                --tertiary-color: #006d88;
                --accent-color: #88fafc;
                --text-color: #eee;
            }

            :root[data-theme="light"] {
                --primary-color: #f0f8ff;
                --secondary-color: #cce8f4;
                --tertiary-color: #99d0e8;
                --accent-color: #005577;
                --text-color: #002834;
            }

            [data-theme="light"],
            [data-theme="light"] body {
                color-scheme: light;
            }

            :root {
                font-size: 16px;
                --toolbar-icon-font:  1.1rem;
                --toolbar-label-font: 0.6rem;
            }
            [data-icon-size="sm"] {
                font-size: 13px;
                --toolbar-icon-font:  0.85rem;
                --toolbar-label-font: 0.5rem;
            }
            [data-icon-size="lg"] {
                font-size: 19px;
                --toolbar-icon-font:  1.4rem;
                --toolbar-label-font: 0.75rem;
            }

            * {
                box-sizing: border-box;
            }

            html, body {
                color-scheme: dark;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

                background-color: var(--primary-color);
                color: var(--text-color);

                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
            }

            h1, h2, h3, h4, h5, h6 {
                margin: 0;
            }

            a {
                color: var(--accent-color);
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            a:visited {
                color: var(--accent-color);
            }

            div#contents {
                display: flex;
                flex-direction: column;
                min-height: 99.9vh;
            }
        </style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="contents">%sveltekit.body%</div>
	</body>
</html>
